name: PR Smoke - build-eks (dispatched by reusable-workflows PRs)

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number in reusable-workflows'
        required: true
        type: string
      caller_run_id:
        description: 'Parent run id for correlation (do not remove - poller greps for this)'
        required: true
        type: string

run-name: "PR #${{ inputs.pr_number }} build-eks smoke (caller ${{ inputs.caller_run_id }})"

jobs:
  build-eks:
    # Literal @pr-smoke — required because GitHub does not allow expressions
    # in a reusable workflow's uses: ref. The reusable-workflows PR-test
    # force-updates refs/heads/pr-smoke to the PR's head SHA right before
    # dispatching this workflow, so @pr-smoke is effectively "the PR under
    # test". Global concurrency in that job serializes smokes across PRs.
    uses: actionsci/reusable-workflows/.github/workflows/build-eks.yaml@pr-smoke
    with:
      env: sandbox
      ref: main
      target_branch: pr-test/${{ inputs.pr_number }}
    secrets: inherit
