name: PR Smoke - build-eks (dispatched by reusable-workflows PRs)

on:
  workflow_dispatch:
    inputs:
      reusable_workflows_ref:
        description: 'SHA of ActionsCI/reusable-workflows to exercise'
        required: true
        type: string
      pr_number:
        description: 'PR number in reusable-workflows'
        required: true
        type: string
      caller_run_id:
        description: 'Parent run id for correlation (do not remove - poller greps for this)'
        required: true
        type: string

# CRITICAL: must contain "caller <caller_run_id>" - the poller in
# reusable-workflows/.github/workflows/build-eks-pr-test.yaml locates this
# run by substring-matching display_title.
run-name: "PR #${{ inputs.pr_number }} build-eks smoke (caller ${{ inputs.caller_run_id }})"

jobs:
  build-eks:
    uses: actionsci/reusable-workflows/.github/workflows/build-eks.yaml@${{ github.event.inputs.reusable_workflows_ref }}
    with:
      env: sandbox
      ref: main
      target_branch: pr-test/${{ inputs.pr_number }}
    secrets: inherit
