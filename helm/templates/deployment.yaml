---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ template "serviceNameEnv" $ }}"
spec:
  {{- if not (and $.Values.hpa $.Values.hpa.enabled) }}
  replicas: {{ $.Values.service.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $.Values.service.name }}
      app.kubernetes.io/part-of: {{ $.Values.service.name }}
  template:
    metadata:
      labels:
        app: "{{ template "serviceNameEnv" $ }}"
        release: "{{ $.Values.service.name }}"
        app.kubernetes.io/name: "{{ $.Values.service.name }}"
        app.kubernetes.io/instance: "{{ template "serviceNameEnv" $ }}"
        app.kubernetes.io/part-of: "{{ $.Values.service.name }}"
        app.kubernetes.io/component: "application"
        app.kubernetes.io/version: "{{ template "version" $ }}"
        tags.datadoghq.com/env: "{{ $.Values.environment }}"
        tags.datadoghq.com/service: "{{ $.Values.service.name }}"
        tags.datadoghq.com/version: {{ template "version" $ }}
    spec:
      serviceAccountName: {{ template "serviceNameEnv" $ }}
      containers:
        - name: {{ template "serviceNameEnv" $ }}
          image: {{ template "serviceImage" $ }}
          ports:
            - containerPort: {{ $.Values.service.ports.http }}
          readinessProbe:
            httpGet:
              path: {{ $.Values.service.probes.readiness.path }}
              port: {{ $.Values.service.ports.http }}
            initialDelaySeconds: 15
          resources:
          {{- if .Values.resources -}}
            {{ .Values.resources | toYaml | nindent 12 }}
          {{- end }}
          env:
            - name: STATSD_PORT
              value: "8125"
            - name: DD_AGENT_HOST
              value: "datadog"
            - name: DD_TRACE_AGENT_PORT
              value: "8126"
          envFrom:
            - configMapRef:
                name: {{ template "serviceNameEnv" $ }}-env-config
      topologySpreadConstraints:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/name: "{{ $.Values.service.name }}"
              app.kubernetes.io/part-of: "{{ $.Values.service.name }}"
              app.kubernetes.io/version: "{{ template "version" $ }}"
          maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
        - labelSelector:
            matchLabels:
              app.kubernetes.io/name: "{{ $.Values.service.name }}"
              app.kubernetes.io/part-of: "{{ $.Values.service.name }}"
              app.kubernetes.io/version: "{{ template "version" $ }}"
          maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
